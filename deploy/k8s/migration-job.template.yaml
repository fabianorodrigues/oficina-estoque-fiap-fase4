apiVersion: batch/v1
kind: Job
metadata:
  name: "{{MIGRATION_JOB_NAME}}"
  namespace: oficina
  labels:
    app.kubernetes.io/name: oficina-estoque
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 1800
  template:
    spec:
      serviceAccountName: estoque-migrator
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migration
          image: "{{MIGRATION_IMAGE}}"
          imagePullPolicy: IfNotPresent
          command:
            - /app/efbundle
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
          volumeMounts:
            - name: migration-db
              mountPath: /mnt/secrets-store
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: migration-db
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: oficina-estoque-migration-db
