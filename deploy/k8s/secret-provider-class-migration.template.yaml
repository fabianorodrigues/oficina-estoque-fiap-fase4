apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: oficina-estoque-migration-db
  namespace: oficina
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "/oficina/estoque/migration-db"
        objectType: "secretsmanager"
        jmesPath:
          - path: ConnectionString
            objectAlias: ConnectionStrings__OficinaEstoqueDb
